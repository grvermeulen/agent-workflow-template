# CodeRabbit — zie https://docs.coderabbit.ai/reference/configuration
# Docstring coverage: minimaal 80% (pre-merge check; zie docs/CONTRIBUTING.md)
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: nl-NL

reviews:
  profile: chill
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 80
  finishing_touches:
    docstrings:
      enabled: true
    custom:
      - name: "deslop"
        instructions: |
          Remove AI-generated narration comments (comments that merely restate
          the code), redundant defensive type checks already covered by
          TypeScript, and tests that test the language runtime rather than
          business logic. Keep comments that explain non-obvious intent,
          trade-offs, or constraints.
      - name: "nl-check"
        instructions: |
          Scan changed files for English user-facing strings (button labels,
          headings, toast messages, placeholder text, alt text, aria-label)
          and flag them. All UI text in this project must be Dutch (NL).
          Ignore: code identifiers, log messages, HTTP status text, and
          comments.

code_generation:
  docstrings:
    language: nl-NL
    path_instructions:
      - path: "src/**/*.{ts,tsx}"
        instructions: |
          Gebruik JSDoc (`/** ... */`) op geëxporteerde functies, hooks, types en React-componenten.
          Voeg @param en @returns toe waar dat de API verduidelijkt; noem korte edge cases (clamping, null).
