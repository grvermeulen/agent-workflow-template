name: Claude Code

# Lets Cos delegate work to Claude Code on the user's Claude subscription:
# mention @claude in an issue or comment and Claude Code implements it and opens
# a PR. Authenticated with a subscription OAuth token (no API billing) — add it
# as the CLAUDE_CODE_OAUTH_TOKEN repository secret (from `claude setup-token`).

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  claude:
    if: >-
      ${{ (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
          (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
          (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-8"
