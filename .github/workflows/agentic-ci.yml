# Agent-/ontwikkelaarworkflow (niet door deze job geautomatiseerd):
# Na fixes voor CodeRabbit- of andere PR-reviewopmerkingen: reviewthreads op GitHub
# op "Resolved" zetten (zelfde ronde als groene checks). Zie AGENTS.md en
# .cursor/rules/verification-loop.mdc (fase 7).
# E2E tegen Vercel Preview (na deploy) zit in preview-e2e-verify.yml; post-merge smoke in post-merge-verify.yml.
name: Agentic CI

on:
  push:
    branches:
      [
        "main",
        "master",
        "image",
        "feat/**",
        "fix/**",
        "dependabot/**",
        "cursor/**",
      ]
  pull_request:
    branches: ["main", "master", "image"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Lint, Typecheck, Build, Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      # Prisma 7 laadt prisma.config.ts en verwacht DATABASE_URL; generate gebruikt geen echte connectie.
      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
        run: npx prisma generate

      - name: Check for merge conflict markers in src/
        run: npm run check:merge-conflicts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npx vitest run
